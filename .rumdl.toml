[global]
exclude = [
  ".git",
  "themes",
]
respect-gitignore = true
disable = [
  "MD036"  # Too many false positives
]

[MD013]
line-length = 88
reflow = true  # Enables automatic text reflow to wrap long lines intelligently
code-blocks = false  # Exclude code blocks from line length check
tables = false  # Exclude tables from line length check
headings = true  # Include headings in line length check

[MD044]
names = [  # Proper names that should be capitalized correctly
  "CPython",
  "Python",
  "Rust",
  "GitHub",
  "API",
  "NZB",
  "PrivateBin"
]
code-blocks = false  # Check code blocks for proper names (default: false, skips code blocks)

[MD049]
style = "asterisk"  # Options: "consistent", "asterisk", "underscore"
